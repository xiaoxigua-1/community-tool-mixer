<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>有趣的小工具箱</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%2318181B'/%3E%3Ccircle cx='16' cy='16' r='8' fill='%23D8B4FE'/%3E%3C/svg%3E">
</head>
<body>
  <nav class="nav">
    <div class="nav-container">
      <a href="index.html" class="nav-brand">
        <svg class="nav-logo" viewBox="0 0 32 32" fill="none">
          <rect width="32" height="32" rx="6" fill="#18181B"/>
          <circle cx="16" cy="16" r="8" fill="#D8B4FE"/>
        </svg>
        <span class="nav-title">Tools</span>
      </a>
      
    </div>
  </nav>

  <main class="main">
    <div style="text-align: center; padding: 4rem 2rem;">
      <h1 style="font-family: var(--font-display); font-size: 2.5rem; font-weight: 800; margin-bottom: 1rem;">
        有趣的小工具箱
      </h1>
      <p style="color: var(--text-secondary); font-size: 1.125rem; max-width: 600px; margin: 0 auto;">
        收錄各種有趣的社群網站小工具，探索數位影像處理、網址壓縮等技巧。
      </p>
      
    </div>

    <div class="grid-2" style="margin-top: 2rem;">
      <div class="card" style="cursor: pointer;" onclick="window.location.href='disappear.html'">
        <span class="badge badge-purple">影像處理</span>
        <h2 class="card-title" style="margin-top: 0.75rem;">消失點 (Vanishing Point)</h2>
        <p class="text-secondary" style="font-size: 0.9375rem;">
          探索「抗重採樣隱寫術」，利用社群平台縮圖演算法的漏洞，創造在縮放後會「消失」的圖片魔術。
        </p>
      </div>
      <div class="card" style="cursor: pointer;" onclick="window.location.href='oshi.html'">
        <span class="badge badge-purple">網址壓縮</span>
        <h2 class="card-title" style="margin-top: 0.75rem;">推鏈 (Oshi-link)</h2>
        <p class="text-secondary" style="font-size: 0.9375rem;">
          將你的推し（最愛）壓縮進一個網址裡。動漫清單、音樂推薦、神作分享 - 全部濃縮進 2048 字元。
        </p>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div style="display: flex; flex-direction: column; gap: 1.5rem; align-items: center;">
      <div style="display: flex; gap: 2rem; flex-wrap: wrap; justify-content: center;">
        <div style="text-align: center;">
          <p style="font-size: 0.75rem; color: var(--accent); margin-bottom: 0.25rem;">消失點</p>
          <p style="font-size: 0.875rem;">By <a href="https://github.com/xxgiasonxx" style="color: var(--text-primary);">xxgiasonxx</a></p>
        </div>
        <div style="text-align: center;">
          <p style="font-size: 0.75rem; color: var(--accent); margin-bottom: 0.25rem;">推鏈</p>
          <p style="font-size: 0.875rem;">By <a href="https://github.com/xiaoxigua-1" style="color: var(--text-primary);">xiaoxigua-1</a></p>
        </div>
      </div>
      <p>Made with curiosity and pixel magic</p>
    </div>
  </footer>
</body>
</html>
